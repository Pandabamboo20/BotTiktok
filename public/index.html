<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikBot — Dashboard</title>
<link rel="icon" href="/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#09090b;--s1:#111115;--s2:#18181d;--s3:#222228;--s4:#2e2e36;--s5:#3a3a44;
  --pink:#fe2c55;--cyan:#25f4ee;--purple:#9b5de5;--green:#1db954;--orange:#ff6b35;--amber:#f59e0b;--red:#ef4444;
  --pink-10:rgba(254,44,85,.10);--pink-20:rgba(254,44,85,.20);
  --cyan-10:rgba(37,244,238,.10);--cyan-20:rgba(37,244,238,.20);
  --purple-10:rgba(155,93,229,.10);--green-10:rgba(29,185,84,.10);--green-20:rgba(29,185,84,.20);
  --orange-10:rgba(255,107,53,.10);--amber-10:rgba(245,158,11,.10);--red-10:rgba(239,68,68,.10);
  --t1:#f4f4f6;--t2:#9898a8;--t3:#4a4a58;
  --b1:rgba(255,255,255,0.06);--b2:rgba(255,255,255,0.10);--b3:rgba(255,255,255,0.16);
  --r4:4px;--r6:6px;--r8:8px;--r10:10px;--r12:12px;--r16:16px;--r20:20px;--rfull:9999px;
  --sh-sm:0 1px 3px rgba(0,0,0,.3);--sh-md:0 4px 12px rgba(0,0,0,.4);--sh-lg:0 12px 32px rgba(0,0,0,.5);
  --sh-pink:0 0 20px rgba(254,44,85,.22),0 0 6px rgba(254,44,85,.12);
  --sidebar-w:220px;
}
html{scroll-behavior:smooth}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;scrollbar-width:thin;scrollbar-color:var(--s4) transparent}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:var(--s4);border-radius:var(--rfull)}

/* ===== CONNECT SCREEN ===== */
#connect-screen{position:fixed;inset:0;z-index:999;display:flex;align-items:center;justify-content:center;background:rgba(9,9,11,.97);backdrop-filter:blur(24px)}
.connect-card{width:min(420px,92vw);background:var(--s1);border:1px solid var(--b2);border-radius:var(--r20);padding:2.25rem;position:relative;overflow:hidden;box-shadow:var(--sh-lg);animation:cardIn .5s cubic-bezier(.16,1,.3,1) both}
@keyframes cardIn{from{opacity:0;transform:translateY(20px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.connect-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--pink),var(--purple),var(--cyan))}
.cc-logo{text-align:center;margin-bottom:1.5rem}
.cc-icon{display:inline-flex;align-items:center;justify-content:center;width:52px;height:52px;border-radius:var(--r16);background:linear-gradient(135deg,var(--pink),var(--purple));font-size:1.5rem;box-shadow:var(--sh-pink);margin-bottom:.875rem}
.cc-title{font-family:'Syne',sans-serif;font-size:1.75rem;font-weight:800;letter-spacing:-.03em;background:linear-gradient(135deg,var(--t1) 40%,var(--t2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:.25rem}
.cc-sub{font-size:.825rem;color:var(--t2)}
.field-lbl{display:block;font-size:.688rem;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:var(--t3);margin-bottom:.4rem}
.field-inp{width:100%;padding:.7rem .9rem;background:var(--s3);border:1px solid var(--b1);border-radius:var(--r10);color:var(--t1);font-family:'IBM Plex Sans',sans-serif;font-size:.938rem;outline:none;transition:border-color .15s,box-shadow .15s;margin-bottom:.875rem}
.field-inp:focus{border-color:var(--pink);box-shadow:0 0 0 3px rgba(254,44,85,.12)}
.field-inp::placeholder{color:var(--t3)}
.btn-connect{width:100%;padding:.8rem;background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;border:none;border-radius:var(--r10);font-family:'Syne',sans-serif;font-size:.938rem;font-weight:700;cursor:pointer;transition:all .2s cubic-bezier(.16,1,.3,1);box-shadow:0 4px 16px rgba(254,44,85,.28);position:relative;overflow:hidden}
.btn-connect::after{content:'';position:absolute;inset:0;background:linear-gradient(rgba(255,255,255,.08),transparent);border-radius:inherit}
.btn-connect:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(254,44,85,.38)}
.btn-connect:disabled{opacity:.45;cursor:not-allowed;transform:none}
.conn-status{margin-top:.875rem;font-size:.813rem;color:var(--t2);min-height:1.3rem;text-align:center}
.conn-status.err{color:var(--pink)}.conn-status.ok{color:var(--cyan)}

/* ===== APP SHELL ===== */
#app{display:none;min-height:100vh;flex-direction:row}
#app.visible{display:flex}

/* ===== SIDEBAR ===== */
.sidebar{width:var(--sidebar-w);background:var(--s1);border-right:1px solid var(--b1);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:50;transition:transform .3s}
.sb-logo{display:flex;align-items:center;gap:.625rem;padding:1.25rem 1.1rem;border-bottom:1px solid var(--b1)}
.sb-logo-mark{width:30px;height:30px;border-radius:var(--r8);background:linear-gradient(135deg,var(--pink),var(--purple));display:grid;place-items:center;font-size:.8rem;box-shadow:var(--sh-pink);flex-shrink:0}
.sb-logo-txt{font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:800;letter-spacing:-.02em}
.sb-logo-txt .p{color:var(--pink)}.sb-logo-txt .c{color:var(--cyan)}
.sb-section{padding:.5rem .7rem;flex:1;overflow-y:auto}
.sb-label{font-size:.625rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--t3);padding:.5rem .5rem .3rem;margin-top:.5rem}
.sb-item{display:flex;align-items:center;gap:.6rem;padding:.55rem .625rem;border-radius:var(--r8);cursor:pointer;transition:all .15s;color:var(--t2);font-size:.825rem;font-weight:500;position:relative;border:none;background:none;width:100%;text-align:left;font-family:'IBM Plex Sans',sans-serif}
.sb-item:hover{background:var(--s2);color:var(--t1)}
.sb-item.active{background:var(--pink-10);color:var(--pink)}
.sb-item .sb-icon{font-size:.95rem;width:18px;text-align:center;flex-shrink:0}
.sb-badge{margin-left:auto;background:var(--pink);color:#fff;font-size:.6rem;font-weight:700;padding:.1em .4em;border-radius:var(--rfull);min-width:18px;text-align:center}
.sb-bottom{padding:.875rem 1.1rem;border-top:1px solid var(--b1)}
.sb-user{display:flex;align-items:center;gap:.6rem}
.sb-avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--s4),var(--s5));display:grid;place-items:center;font-family:'IBM Plex Mono',monospace;font-size:.65rem;font-weight:500;color:var(--cyan);border:1px solid var(--b2);flex-shrink:0}
.sb-username{font-size:.813rem;font-weight:500;color:var(--t2);font-family:'IBM Plex Mono',monospace;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-disc-btn{background:none;border:none;color:var(--t3);cursor:pointer;font-size:.75rem;padding:.25rem;transition:color .15s;border-radius:var(--r4)}
.sb-disc-btn:hover{color:var(--pink)}
.live-indicator{display:flex;align-items:center;gap:.4rem;padding:.35rem .625rem;background:var(--pink-10);border-radius:var(--rfull);margin-bottom:.75rem;border:1px solid var(--pink-20)}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--pink);box-shadow:0 0 6px var(--pink);animation:ldot 1.5s ease-in-out infinite;flex-shrink:0}
@keyframes ldot{0%,100%{opacity:1}50%{opacity:.3}}
.live-text{font-size:.688rem;font-weight:700;letter-spacing:.07em;color:var(--pink);text-transform:uppercase}
.live-viewers{margin-left:auto;font-size:.688rem;color:var(--t2);font-family:'IBM Plex Mono',monospace}

/* ===== MAIN CONTENT ===== */
.main-wrap{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{position:sticky;top:0;z-index:40;display:flex;align-items:center;justify-content:space-between;padding:.875rem 1.75rem;background:rgba(9,9,11,.88);backdrop-filter:blur(20px);border-bottom:1px solid var(--b1)}
.topbar-title{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700;letter-spacing:-.02em}
.topbar-right{display:flex;align-items:center;gap:.5rem}
.page-content{padding:1.5rem 1.75rem;flex:1}

/* ===== CARDS & SHARED ===== */
.card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r16);position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.07),transparent);pointer-events:none}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:.875rem 1.125rem;border-bottom:1px solid var(--b1)}
.card-title{font-size:.75rem;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:var(--t3);display:flex;align-items:center;gap:.4rem}
.card-body{padding:1.125rem}
.card-body.p0{padding:0}

.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1rem;margin-bottom:1.5rem}
.stat-box{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r16);padding:1.125rem;position:relative;overflow:hidden}
.stat-box::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.07),transparent)}
.stat-icon{width:36px;height:36px;border-radius:var(--r8);display:grid;place-items:center;font-size:.9rem;margin-bottom:.625rem}
.si-pink{background:var(--pink-10)}.si-cyan{background:var(--cyan-10)}.si-purple{background:var(--purple-10)}.si-green{background:var(--green-10)}.si-amber{background:var(--amber-10)}.si-orange{background:var(--orange-10)}
.stat-val{font-family:'Syne',sans-serif;font-size:1.75rem;font-weight:800;letter-spacing:-.04em;line-height:1}
.sv-pink{color:var(--pink)}.sv-cyan{color:var(--cyan)}.sv-purple{color:var(--purple)}.sv-green{color:var(--green)}.sv-amber{color:var(--amber)}.sv-orange{color:var(--orange)}
.stat-lbl{font-size:.688rem;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-top:.3rem}
.stat-sub{font-size:.75rem;color:var(--t2);margin-top:.2rem}

.table{width:100%;border-collapse:collapse}
.table th{font-size:.688rem;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:var(--t3);padding:.625rem 1rem;border-bottom:1px solid var(--b1);text-align:left}
.table td{padding:.75rem 1rem;border-bottom:1px solid var(--b1);font-size:.825rem;vertical-align:middle}
.table tr:last-child td{border-bottom:none}
.table tr:hover td{background:var(--s2)}

.btn{display:inline-flex;align-items:center;gap:.375rem;padding:.5rem .875rem;border-radius:var(--r8);font-family:'IBM Plex Sans',sans-serif;font-size:.813rem;font-weight:500;cursor:pointer;transition:all .15s;border:none;white-space:nowrap}
.btn-primary{background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;box-shadow:0 3px 10px rgba(254,44,85,.22)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 5px 14px rgba(254,44,85,.32)}
.btn-ghost{background:var(--s3);color:var(--t2);border:1px solid var(--b1)}
.btn-ghost:hover{background:var(--s4);color:var(--t1)}
.btn-danger{background:var(--red-10);color:var(--red);border:1px solid rgba(239,68,68,.2)}
.btn-danger:hover{background:rgba(239,68,68,.2)}
.btn-green{background:var(--green-10);color:var(--green);border:1px solid var(--green-20)}
.btn-green:hover{background:var(--green-20)}
.btn-sm{padding:.3rem .6rem;font-size:.75rem}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none!important}
.btn:active{transform:scale(.97)}

.badge{display:inline-flex;align-items:center;padding:.15em .5em;border-radius:var(--r4);font-size:.65rem;font-weight:700;letter-spacing:.04em;white-space:nowrap}
.badge-pink{background:var(--pink-10);color:var(--pink)}
.badge-cyan{background:var(--cyan-10);color:var(--cyan)}
.badge-green{background:var(--green-10);color:var(--green)}
.badge-amber{background:var(--amber-10);color:var(--amber)}
.badge-red{background:var(--red-10);color:var(--red)}
.badge-purple{background:var(--purple-10);color:var(--purple)}
.badge-gray{background:var(--s3);color:var(--t2)}

.toggle{width:36px;height:20px;border-radius:var(--rfull);background:var(--s4);border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--pink)}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:transform .2s cubic-bezier(.16,1,.3,1);box-shadow:0 1px 3px rgba(0,0,0,.3)}
.toggle.on::after{transform:translateX(16px)}

.input{width:100%;padding:.625rem .875rem;background:var(--s3);border:1px solid var(--b1);border-radius:var(--r8);color:var(--t1);font-family:'IBM Plex Sans',sans-serif;font-size:.825rem;outline:none;transition:border-color .15s,box-shadow .15s}
.input:focus{border-color:var(--pink);box-shadow:0 0 0 2px rgba(254,44,85,.1)}
.input::placeholder{color:var(--t3)}
.input-sm{padding:.4rem .6rem;font-size:.75rem}
select.input{cursor:pointer}

.form-row{display:flex;gap:.625rem;margin-bottom:.75rem;align-items:flex-end}
.form-group{display:flex;flex-direction:column;gap:.35rem;flex:1}
.form-label{font-size:.688rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--t3)}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);z-index:200;display:none;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--s1);border:1px solid var(--b2);border-radius:var(--r20);padding:1.75rem;width:min(500px,92vw);box-shadow:var(--sh-lg);animation:cardIn .3s cubic-bezier(.16,1,.3,1);position:relative;overflow:hidden}
.modal::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--pink),var(--purple),var(--cyan))}
.modal-title{font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:700;letter-spacing:-.02em;margin-bottom:1.25rem}
.modal-footer{display:flex;justify-content:flex-end;gap:.5rem;margin-top:1.25rem;padding-top:1rem;border-top:1px solid var(--b1)}

.empty{text-align:center;padding:3rem 1rem;color:var(--t3);font-size:.825rem;line-height:1.7}
.empty-icon{font-size:2rem;opacity:.25;margin-bottom:.625rem}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeUp .25s cubic-bezier(.16,1,.3,1) both}

/* ===== DASHBOARD PAGE ===== */
.dashboard-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.chat-feed{max-height:320px;overflow-y:auto;display:flex;flex-direction:column;gap:.3rem}
.cf-item{display:flex;align-items:flex-start;gap:.5rem;padding:.45rem .5rem;border-radius:var(--r8);transition:background .1s}
.cf-item:hover{background:var(--s2)}
.cf-avatar{width:24px;height:24px;border-radius:50%;background:var(--s4);display:grid;place-items:center;font-size:.58rem;font-weight:600;color:var(--cyan);flex-shrink:0;font-family:'IBM Plex Mono',monospace;border:1px solid var(--b1)}
.cf-content{flex:1;min-width:0}
.cf-user{font-size:.688rem;font-weight:600;color:var(--t2);display:flex;align-items:center;gap:.25rem;margin-bottom:.08rem}
.cf-text{font-size:.775rem;color:var(--t2);line-height:1.4;word-break:break-word}
.cf-text.song{color:var(--pink);font-weight:600}
.cf-time{font-size:.6rem;color:var(--t3);font-family:'IBM Plex Mono',monospace}
.cf-sys{font-size:.75rem;color:var(--cyan);background:var(--cyan-10);border-left:2px solid var(--cyan);padding:.4rem .6rem;border-radius:var(--r4);animation:fadeUp .2s ease}
.cf-gift{font-size:.75rem;color:var(--amber);background:var(--amber-10);border-left:2px solid var(--amber);padding:.4rem .6rem;border-radius:var(--r4)}

/* ===== SONG REQUESTS PAGE ===== */
.player-area{display:grid;grid-template-columns:280px 1fr;gap:1rem}
.embed-wrap{border-radius:var(--r12);background:var(--s3);overflow:hidden;position:relative}
.embed-wrap.yt{aspect-ratio:16/9}
.embed-wrap.sp{height:152px}
.embed-wrap.sc{height:166px}
.embed-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:none;border-radius:var(--r12)}
.embed-idle{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.5rem;color:var(--t3);text-align:center;padding:1rem;font-size:.813rem}
.embed-idle-icon{font-size:2rem;opacity:.25}
.yt-thumb-layer{position:absolute;inset:0;display:none;cursor:pointer}
.yt-thumb-layer img{width:100%;height:100%;object-fit:cover}
.play-over{position:absolute;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;transition:background .2s}
.yt-thumb-layer:hover .play-over{background:rgba(0,0,0,.5)}
.play-big{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--pink),var(--purple));display:grid;place-items:center;font-size:1.1rem;box-shadow:var(--sh-pink)}
.np-meta{text-align:center;padding:.875rem 0 .75rem}
.np-title{font-family:'Syne',sans-serif;font-size:.95rem;font-weight:700;letter-spacing:-.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:.2rem}
.np-artist{font-size:.775rem;color:var(--t2)}
.np-by{font-size:.688rem;color:var(--pink);margin-top:.2rem;font-family:'IBM Plex Mono',monospace}
.prog-bar{width:100%;height:3px;background:var(--s4);border-radius:var(--rfull);margin-bottom:.375rem;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--pink),var(--purple));border-radius:var(--rfull);transition:width 1s linear}
.prog-times{display:flex;justify-content:space-between;font-family:'IBM Plex Mono',monospace;font-size:.65rem;color:var(--t3);margin-bottom:.75rem}
.controls{display:flex;align-items:center;justify-content:center;gap:.5rem}
.ctrl{background:var(--s3);border:1px solid var(--b1);color:var(--t2);border-radius:50%;cursor:pointer;display:grid;place-items:center;transition:all .15s;font-size:.8rem}
.ctrl:hover{background:var(--s4);color:var(--t1);transform:scale(1.06)}
.ctrl.sm{width:32px;height:32px}
.ctrl.lg{width:44px;height:44px;font-size:.95rem;background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;border-color:transparent;box-shadow:var(--sh-pink)}
.ctrl.lg:hover{transform:scale(1.08)}
.ctrl.active{color:var(--cyan);border-color:rgba(37,244,238,.4)}
.src-tabs{display:flex;gap:.3rem;padding:.5rem;background:var(--s2);border-radius:var(--r10);border:1px solid var(--b1);margin-bottom:.875rem}
.stab{flex:1;display:flex;align-items:center;justify-content:center;gap:.35rem;padding:.45rem .5rem;border-radius:var(--r6);font-size:.75rem;font-weight:600;cursor:pointer;transition:all .15s;border:none;background:none;color:var(--t3);font-family:'IBM Plex Sans',sans-serif}
.stab:hover{color:var(--t2);background:var(--s3)}
.stab.yt-on{background:var(--pink-10);color:var(--pink);border:1px solid var(--pink-20)}
.stab.sp-on{background:var(--green-10);color:var(--green);border:1px solid var(--green-20)}
.stab.sc-on{background:var(--orange-10);color:var(--orange);border:1px solid rgba(255,107,53,.2)}
.qlist{display:flex;flex-direction:column;gap:.3rem;max-height:380px;overflow-y:auto}
.qitem{display:flex;align-items:center;gap:.5rem;padding:.55rem .7rem;border-radius:var(--r10);background:var(--s2);border:1px solid var(--b1);cursor:pointer;transition:all .2s;animation:fadeUp .25s ease both}
.qitem:hover{background:var(--s3);border-color:var(--b2);transform:translateX(3px)}
.qnum{font-family:'IBM Plex Mono',monospace;font-size:.65rem;color:var(--t3);min-width:14px}
.qthumb{width:36px;height:36px;border-radius:var(--r6);background:var(--s4);overflow:hidden;flex-shrink:0;display:grid;place-items:center;font-size:.9rem}
.qthumb img{width:100%;height:100%;object-fit:cover}
.qmeta{flex:1;min-width:0}
.qname{font-size:.8rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.qsub{font-size:.65rem;color:var(--t2)}
.qs-badge{font-size:.58rem;padding:.1em .38em;border-radius:var(--r4);font-weight:700;flex-shrink:0}
.qs-yt{background:var(--pink-10);color:var(--pink)}.qs-sp{background:var(--green-10);color:var(--green)}.qs-sc{background:var(--orange-10);color:var(--orange)}
.qdel{background:none;border:none;color:var(--t3);cursor:pointer;padding:.2rem;border-radius:var(--r4);transition:all .15s;font-size:.7rem}
.qdel:hover{color:var(--pink);background:var(--pink-10)}

/* ===== MODERATION ===== */
.mod-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.mod-rule{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;padding:.875rem 1.125rem;border-bottom:1px solid var(--b1)}
.mod-rule:last-child{border-bottom:none}
.mod-rule-info{flex:1}
.mod-rule-title{font-size:.825rem;font-weight:600;margin-bottom:.2rem}
.mod-rule-desc{font-size:.75rem;color:var(--t2);line-height:1.5}
.mod-rule-controls{display:flex;align-items:center;gap:.625rem;flex-shrink:0}
.range-input{-webkit-appearance:none;width:80px;height:4px;border-radius:var(--rfull);background:var(--s4);outline:none}
.range-input::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--pink);cursor:pointer;box-shadow:0 0 8px rgba(254,44,85,.3)}

/* ===== LOGS ===== */
.log-filters{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:1rem}
.log-filter{padding:.3rem .7rem;border-radius:var(--rfull);font-size:.725rem;font-weight:600;cursor:pointer;transition:all .15s;border:1px solid var(--b1);background:var(--s2);color:var(--t2)}
.log-filter.active{background:var(--pink-10);color:var(--pink);border-color:var(--pink-20)}
.log-entry{display:flex;align-items:flex-start;gap:.625rem;padding:.6rem .875rem;border-bottom:1px solid var(--b1);transition:background .1s;font-size:.775rem}
.log-entry:hover{background:var(--s2)}
.log-icon{width:24px;height:24px;border-radius:50%;display:grid;place-items:center;font-size:.65rem;flex-shrink:0;margin-top:.1rem}
.log-type-chat{background:var(--cyan-10)}
.log-type-command{background:var(--purple-10)}
.log-type-mod{background:var(--red-10)}
.log-type-gift{background:var(--amber-10)}
.log-type-system{background:var(--s3)}
.log-type-timer{background:var(--green-10)}
.log-time{font-family:'IBM Plex Mono',monospace;font-size:.65rem;color:var(--t3);flex-shrink:0;margin-top:.15rem}
.log-text{flex:1;color:var(--t2);line-height:1.4}
.log-text .user{color:var(--t1);font-weight:600}

/* ===== GIVEAWAY ===== */
.gw-card{border-color:var(--amber-10);background:linear-gradient(160deg,rgba(245,158,11,.04),var(--s1) 60%)}
.gw-active-badge{display:flex;align-items:center;gap:.35rem;padding:.3rem .7rem;background:var(--green-10);border:1px solid var(--green-20);border-radius:var(--rfull);font-size:.68rem;font-weight:700;color:var(--green)}
.entry-counter{font-family:'Syne',sans-serif;font-size:3rem;font-weight:800;color:var(--amber);letter-spacing:-.04em;line-height:1;text-align:center;padding:1.5rem 0}
.winner-reveal{padding:1.5rem;text-align:center;background:linear-gradient(135deg,rgba(254,44,85,.08),rgba(155,93,229,.08));border-radius:var(--r12);border:1px solid var(--pink-20)}
.winner-name{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;color:var(--pink);letter-spacing:-.03em;margin-bottom:.35rem}

/* RESPONSIVE */
@media(max-width:900px){.sidebar{transform:translateX(-100%)}.main-wrap{margin-left:0}.dashboard-grid{grid-template-columns:1fr}.player-area{grid-template-columns:1fr}.mod-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- ===== CONNECT SCREEN ===== -->
<div id="connect-screen">
  <div class="connect-card">
    <div class="cc-logo">
      <div class="cc-icon">🎵</div>
      <div class="cc-title">TikBot</div>
      <div class="cc-sub">Panel de control para TikTok Live</div>
    </div>
    <label class="field-lbl">Usuario de TikTok</label>
    <input class="field-inp" id="inp-user" placeholder="@nombre_streamer" autocomplete="off" spellcheck="false">
    <button class="btn-connect" id="btn-conn" onclick="connectToLive()">Conectar al Live 🔴</button>
    <div class="conn-status" id="conn-status"></div>
  </div>
</div>

<!-- ===== APP ===== -->
<div id="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sb-logo">
      <div class="sb-logo-mark">🎵</div>
      <div class="sb-logo-txt"><span class="p">TIK</span><span class="c">BOT</span></div>
    </div>
    <div class="sb-section">
      <div class="sb-label">Principal</div>
      <button class="sb-item active" onclick="nav('dashboard')"><span class="sb-icon">🏠</span> Dashboard</button>
      <button class="sb-item" onclick="nav('songreqs')"><span class="sb-icon">🎵</span> Song Requests <span class="sb-badge" id="sb-queue-count" style="display:none">0</span></button>

      <div class="sb-label">Herramientas</div>
      <button class="sb-item" onclick="nav('commands')"><span class="sb-icon">⌘</span> Commands</button>
      <button class="sb-item" onclick="nav('timers')"><span class="sb-icon">⏱</span> Timers</button>
      <button class="sb-item" onclick="nav('giveaways')"><span class="sb-icon">🎁</span> Giveaways</button>

      <div class="sb-label">Gestión</div>
      <button class="sb-item" onclick="nav('regulars')"><span class="sb-icon">⭐</span> Regulars</button>
      <button class="sb-item" onclick="nav('moderation')"><span class="sb-icon">🛡</span> Moderación</button>
      <button class="sb-item" onclick="nav('logs')"><span class="sb-icon">📋</span> Logs <span class="sb-badge" id="sb-log-badge" style="display:none">!</span></button>
    </div>
    <div class="sb-bottom">
      <div class="live-indicator" id="live-indicator" style="display:none">
        <div class="live-dot"></div>
        <span class="live-text">Live</span>
        <span class="live-viewers" id="sb-viewers">—</span>
      </div>
      <div class="sb-user">
        <div class="sb-avatar" id="sb-avatar">?</div>
        <span class="sb-username" id="sb-username">Sin conectar</span>
        <button class="sb-disc-btn" onclick="disconnectLive()" title="Desconectar">✕</button>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main-wrap">
    <div class="topbar">
      <div class="topbar-title" id="page-title">Dashboard</div>
      <div class="topbar-right" id="topbar-actions"></div>
    </div>
    <div class="page-content" id="page-content"></div>
  </div>
</div>

<!-- ===== MODAL ===== -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title" id="modal-title">Modal</div>
    <div id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
// ============================================================
// STATE
// ============================================================
let ws = null;
let connectedUser = '';
let currentPage = 'dashboard';
let stats = { req:0, play:0, commands:0, mods:0 };
let liveStats = { viewers:0, liveSecs:0 };
let liveTimer = null, progTimer = null;

// Song Requests state
let queue = [], nowPlaying = null;
let ytPlayer = null, ytReady = false;
let isPlaying = false, isShuffle = false, isRepeat = false, autoPlay = true;
let currentSrc = 'yt', reqSrc = 'yt';
let pendingReqs = {}, reqCounter = 0;

// ============================================================
// YOUTUBE API
// ============================================================
function onYouTubeIframeAPIReady() { ytReady = true; }

function createYTPlayer(videoId) {
  const wrap = document.getElementById('yt-iframe-container');
  if (!wrap) return;
  wrap.innerHTML = ''; const d = document.createElement('div'); d.id='yt-player-el'; wrap.appendChild(d); wrap.style.display='block';
  document.getElementById('yt-thumb-layer').style.display = 'none';
  ytPlayer = new YT.Player('yt-player-el', { videoId, playerVars:{autoplay:1,controls:1,rel:0,modestbranding:1}, events:{
    onReady: e => { e.target.playVideo(); isPlaying=true; setPlayBtn(false); },
    onStateChange: e => {
      if (e.data===YT.PlayerState.ENDED) { clearInterval(progTimer); if(isRepeat&&nowPlaying){createYTPlayer(nowPlaying.videoId);return;} nextSong(); }
      if (e.data===YT.PlayerState.PLAYING) { isPlaying=true; setPlayBtn(false); startProgTimer(); }
      if (e.data===YT.PlayerState.PAUSED)  { isPlaying=false; setPlayBtn(true); }
    },
    onError: () => { sysMsg('⚠️ Video no embeddable. Saltando…'); nextSong(); }
  }});
}
function setPlayBtn(paused) { const b=document.getElementById('btn-play'); if(b) b.textContent=paused?'▶':'⏸'; }
function startYTPlayback() { if(!nowPlaying||nowPlaying.src!=='yt') return; document.getElementById('yt-thumb-layer').style.display='none'; createYTPlayer(nowPlaying.videoId); }
function startProgTimer() {
  clearInterval(progTimer);
  progTimer = setInterval(() => {
    if(!ytPlayer?.getCurrentTime) return;
    try { const c=Math.floor(ytPlayer.getCurrentTime()),t=Math.floor(ytPlayer.getDuration())||1; const pf=document.getElementById('prog-fill'); const ct=document.getElementById('cur-time'); const tt=document.getElementById('tot-time'); if(pf)pf.style.width=Math.round(c/t*100)+'%'; if(ct)ct.textContent=fmt(c); if(tt)tt.textContent=fmt(t); } catch {}
  }, 1000);
}

// ============================================================
// NAVIGATION
// ============================================================
const PAGE_TITLES = { dashboard:'Dashboard', songreqs:'Song Requests', commands:'Commands', timers:'Timers', giveaways:'Giveaways', regulars:'Regulars', moderation:'Moderación', logs:'Logs' };

function nav(page) {
  currentPage = page;
  document.querySelectorAll('.sb-item').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.sb-item').forEach(b => { if(b.getAttribute('onclick')?.includes(`'${page}'`)) b.classList.add('active'); });
  document.getElementById('page-title').textContent = PAGE_TITLES[page] || page;
  document.getElementById('topbar-actions').innerHTML = '';
  const content = document.getElementById('page-content');
  content.innerHTML = '';
  switch(page) {
    case 'dashboard':  renderDashboard(); break;
    case 'songreqs':   renderSongReqs(); break;
    case 'commands':   renderCommands(); break;
    case 'timers':     renderTimers(); break;
    case 'giveaways':  renderGiveaways(); break;
    case 'regulars':   renderRegulars(); break;
    case 'moderation': renderModeration(); break;
    case 'logs':       renderLogs(); break;
  }
}

// ============================================================
// WEBSOCKET
// ============================================================
function connectToLive() {
  let username = document.getElementById('inp-user').value.trim().replace('@','');
  if (!username) { setConnStatus('Ingresá un usuario válido.','err'); return; }
  const btn = document.getElementById('btn-conn');
  btn.disabled=true; btn.textContent='Conectando…';
  setConnStatus('Conectando al servidor…','');
  const proto = location.protocol==='https:'?'wss:':'ws:';
  ws = new WebSocket(`${proto}//${location.host}`);
  ws.onopen = () => ws.send(JSON.stringify({type:'connect',username}));
  ws.onmessage = e => handleWS(JSON.parse(e.data));
  ws.onerror = () => { setConnStatus('No se pudo conectar al servidor.','err'); btn.disabled=false; btn.textContent='Conectar al Live 🔴'; };
  ws.onclose = () => { if(document.getElementById('app').classList.contains('visible')) sysMsg('⚠️ Conexión perdida.'); };
}

function handleWS(data) {
  const btn = document.getElementById('btn-conn');
  if (data.type==='connected') {
    connectedUser = data.username;
    document.getElementById('connect-screen').style.display='none';
    document.getElementById('app').classList.add('visible');
    document.getElementById('sb-username').textContent = `@${data.username}`;
    document.getElementById('sb-avatar').textContent = data.username.slice(0,2).toUpperCase();
    document.getElementById('live-indicator').style.display='flex';
    btn.disabled=false; btn.textContent='Conectar al Live 🔴';
    startLiveTimer();
    nav('dashboard');
    sysMsg(`✅ Conectado al live de @${data.username}`);
  }
  if (data.type==='error')  { setConnStatus(data.text,'err'); btn.disabled=false; btn.textContent='Conectar al Live 🔴'; }
  if (data.type==='status') setConnStatus(data.text,'');

  if (data.type==='chat') {
    addChatFeed(data);
    if (data.songRequest) {
      addSongRequest(data.user, data.songRequest.song, currentSrc);
    }
    if (data.commandTriggered && currentPage==='dashboard') {
      sysMsg(`⌘ ${data.user} → ${data.command}`);
      stats.commands++;
    }
  }
  if (data.type==='modAction') { stats.mods++; sysMsg(`🛡 Moderado: ${data.user} (${data.action})`); }
  if (data.type==='gift') { addGiftFeed(data); }
  if (data.type==='join') { /* silent */ }
  if (data.type==='follow') { sysMsg(`💜 ${data.user} te siguió`); }
  if (data.type==='viewers') {
    const v=data.count; liveStats.viewers=v;
    const txt = v>=1000?`${(v/1000).toFixed(1)}K`:String(v);
    document.getElementById('sb-viewers').textContent = txt+' viewers';
    const vc=document.getElementById('dash-viewers'); if(vc) vc.textContent=txt;
  }
  if (data.type==='timerFired') { sysMsg(`⏱ ${data.name}: ${data.message}`); }
  if (data.type==='giveawayEntry') {
    const cnt = document.getElementById('gw-entry-count');
    if (cnt) cnt.textContent = data.count;
  }
  if (data.type==='streamEnd') { sysMsg(data.text); document.getElementById('live-indicator').style.display='none'; }
  if (data.type==='disconnected') {
    document.getElementById('connect-screen').style.display='flex';
    document.getElementById('app').classList.remove('visible');
    stopLiveTimer(); queue=[]; nowPlaying=null;
  }
  if (data.type==='youtubeResult') {
    const p = pendingReqs[data.requestId]; delete pendingReqs[data.requestId];
    if(p) onYTFound(data, p.user);
  }
  if (data.type==='youtubeNotFound') {
    const p = pendingReqs[data.requestId]; delete pendingReqs[data.requestId];
    sysMsg(`❌ No encontré "${data.query}" en YouTube.`);
  }
}

function disconnectLive() { if(ws) ws.send(JSON.stringify({type:'disconnect'})); }
function setConnStatus(t,type) { const el=document.getElementById('conn-status'); el.textContent=t; el.className='conn-status'+(type?' '+type:''); }

// ============================================================
// CHAT FEED (shared across pages)
// ============================================================
const chatFeedItems = [];
function addChatFeed(data) {
  chatFeedItems.unshift(data);
  if (chatFeedItems.length > 200) chatFeedItems.pop();
  if (currentPage==='dashboard') appendChatFeedItem(data);
}
function addGiftFeed(data) {
  const item = { ...data, isGift:true };
  chatFeedItems.unshift(item);
  if (currentPage==='dashboard') {
    const feed = document.getElementById('chat-feed');
    if (!feed) return;
    const d = document.createElement('div'); d.className='cf-gift';
    d.textContent = `🎁 ${data.user} envió ${data.repeatCount}x ${data.giftName}!`;
    feed.prepend(d); if(feed.children.length>80) feed.removeChild(feed.lastChild);
  }
}
function appendChatFeedItem(data) {
  const feed = document.getElementById('chat-feed');
  if (!feed) return;
  const init = data.user.replace('@','').slice(0,2).toUpperCase();
  const time = new Date(data.timestamp).toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'});
  const d = document.createElement('div'); d.className='cf-item fade-in';
  d.innerHTML=`<div class="cf-avatar">${init}</div><div class="cf-content"><div class="cf-user">${data.user}${data.isMod?'<span class="badge badge-cyan" style="font-size:.55rem">MOD</span>':''}${data.isSub?'<span class="badge badge-purple" style="font-size:.55rem">SUB</span>':''}</div><div class="cf-text${data.songRequest?' song':''}">${data.songRequest?'🎵 '+data.comment:data.comment}</div></div><div class="cf-time">${time}</div>`;
  feed.prepend(d); if(feed.children.length>80) feed.removeChild(feed.lastChild);
}
function sysMsg(text) {
  const feed = document.getElementById('chat-feed');
  if (!feed) return;
  const d = document.createElement('div'); d.className='cf-sys fade-in'; d.innerHTML=text;
  feed.prepend(d); if(feed.children.length>80) feed.removeChild(feed.lastChild);
}

// ============================================================
// SONG REQUESTS
// ============================================================
function addSongRequest(user, query, source) {
  stats.req++; updateQueueBadge();
  if (source==='yt') {
    const id = ++reqCounter; pendingReqs[id]={user,query};
    if(ws?.readyState===1) ws.send(JSON.stringify({type:'searchYoutube',query,requestId:id}));
  } else {
    addToQueue({title:query,author:'',user,src:source,thumbnail:null,videoId:null,duration:'?',durationSecs:0});
  }
}
function onYTFound(data, user) {
  addToQueue({title:data.title,author:data.author,user,src:'yt',thumbnail:data.thumbnail,videoId:data.videoId,duration:data.duration,durationSecs:data.durationSecs});
}
function addToQueue(song) {
  queue.push(song); updateQueueBadge();
  if (currentPage==='songreqs') renderQueueList();
  if (!nowPlaying && autoPlay) loadNext();
}
function loadNext() {
  if (!queue.length) { nowPlaying=null; return; }
  const s = isShuffle ? queue.splice(Math.floor(Math.random()*queue.length),1)[0] : queue.shift();
  setNowPlaying(s); if(currentPage==='songreqs') renderQueueList();
}
function playFromQueue(i) { const s=queue.splice(i,1)[0]; setNowPlaying(s); renderQueueList(); }
function removeFromQueue(i) { queue.splice(i,1); renderQueueList(); updateQueueBadge(); }
function setNowPlaying(song) {
  nowPlaying=song; stats.play++;
  if (currentPage!=='songreqs') return;
  document.getElementById('np-title').textContent=song.title;
  document.getElementById('np-artist').textContent=song.author||'';
  document.getElementById('np-by').textContent=`Pedida por ${song.user} 💖`;
  document.getElementById('np-status').textContent='REPRODUCIENDO';
  setPlayerSource(song.src);
  const pf=document.getElementById('prog-fill'); const ct=document.getElementById('cur-time'); const tt=document.getElementById('tot-time');
  if(pf)pf.style.width='0%'; if(ct)ct.textContent='0:00'; if(tt)tt.textContent=song.duration||'0:00';
  document.getElementById('yt-iframe-container').style.display='none';
  document.getElementById('embed-iframe-wrap').style.display='none';
  document.getElementById('yt-thumb-layer').style.display='none';
  if(ytPlayer){try{ytPlayer.destroy();}catch{}ytPlayer=null;}
  if(song.src==='yt'&&song.thumbnail){document.getElementById('yt-thumb-img').src=song.thumbnail;document.getElementById('yt-thumb-layer').style.display='block';if(ytReady)setTimeout(()=>startYTPlayback(),300);}
  else if(song.src==='sp'){loadSpotifyEmbed(song.title+' '+(song.author||''));}
  else if(song.src==='sc'){loadSoundCloudEmbed(song.title+' '+(song.author||''));}
}
function updateQueueBadge() {
  const b=document.getElementById('sb-queue-count');
  if(!b) return; b.style.display=queue.length?'':'none'; b.textContent=queue.length;
}
function renderQueueList() {
  const list=document.getElementById('queue-list'); if(!list) return;
  if(!queue.length){list.innerHTML='<div class="empty"><div class="empty-icon">🎵</div>Cola vacía — espera requests del chat</div>';updateQueueBadge();return;}
  list.innerHTML=queue.map((s,i)=>`<div class="qitem" onclick="playFromQueue(${i})"><span class="qnum">${i+1}</span><div class="qthumb">${s.thumbnail?`<img src="${s.thumbnail}" loading="lazy">`:'🎵'}</div><div class="qmeta"><div class="qname">${s.title}</div><div class="qsub">${s.author?s.author+' · ':''}${s.user}</div></div><span class="qs-badge qs-${s.src}">${s.src.toUpperCase()}</span><button class="qdel" onclick="event.stopPropagation();removeFromQueue(${i})">✕</button></div>`).join('');
  updateQueueBadge();
}
function setPlayerSource(src) {
  currentSrc=src;
  document.querySelectorAll('.stab').forEach(b=>b.className='stab');
  const t=document.querySelector(`.stab[data-src="${src}"]`); if(t) t.className=`stab ${src}-on`;
  const ew=document.getElementById('embed-wrap'); if(ew){ew.className=`embed-wrap ${src}`;}
  const pw=document.getElementById('prog-wrap'); if(pw){pw.style.display=src==='yt'?'block':'none';}
}
function loadSpotifyEmbed(q){const w=document.getElementById('embed-iframe-wrap');if(!w)return;w.innerHTML=`<iframe src="https://open.spotify.com/embed/search/${encodeURIComponent(q)}" width="100%" height="152" frameborder="0" allow="autoplay;clipboard-write;encrypted-media;fullscreen;picture-in-picture" loading="lazy" style="border-radius:12px"></iframe>`;w.style.display='block';const idle=document.getElementById('embed-idle');if(idle)idle.style.display='none';}
function loadSoundCloudEmbed(q){const w=document.getElementById('embed-iframe-wrap');if(!w)return;const u=`https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/search%3Fq%3D${encodeURIComponent(q)}&color=%23fe2c55&auto_play=true&hide_related=true&show_comments=false`;w.innerHTML=`<iframe width="100%" height="166" scrolling="no" frameborder="no" allow="autoplay" src="${u}" style="border-radius:12px"></iframe>`;w.style.display='block';const idle=document.getElementById('embed-idle');if(idle)idle.style.display='none';}
function nextSong(){if(ytPlayer){try{ytPlayer.stopVideo();ytPlayer.destroy();}catch{}ytPlayer=null;}const w=document.getElementById('yt-iframe-container');if(w)w.style.display='none';if(isRepeat&&nowPlaying){setNowPlaying(nowPlaying);return;}loadNext();}
function prevSong(){if(ytPlayer){try{ytPlayer.seekTo(0);}catch{}}}
function togglePlay(){if(!ytPlayer){if(nowPlaying?.src==='yt')startYTPlayback();return;}try{isPlaying?ytPlayer.pauseVideo():ytPlayer.playVideo();}catch{}}
function toggleShuffle(){isShuffle=!isShuffle;const b=document.getElementById('btn-shuf');if(b)b.classList.toggle('active',isShuffle);}
function toggleRepeat(){isRepeat=!isRepeat;const b=document.getElementById('btn-rep');if(b)b.classList.toggle('active',isRepeat);}

// ============================================================
// PAGES
// ============================================================

// ─── DASHBOARD ───
function renderDashboard() {
  const c=document.getElementById('page-content');
  c.innerHTML=`
  <div class="stat-row">
    <div class="stat-box"><div class="stat-icon si-pink">🎵</div><div class="stat-val sv-pink">${stats.req}</div><div class="stat-lbl">Song Requests</div></div>
    <div class="stat-box"><div class="stat-icon si-cyan">👁</div><div class="stat-val sv-cyan" id="dash-viewers">${liveStats.viewers||'—'}</div><div class="stat-lbl">Viewers</div></div>
    <div class="stat-box"><div class="stat-icon si-purple">⌘</div><div class="stat-val sv-purple">${stats.commands}</div><div class="stat-lbl">Comandos usados</div></div>
    <div class="stat-box"><div class="stat-icon si-amber">🛡</div><div class="stat-val sv-amber">${stats.mods}</div><div class="stat-lbl">Mensajes moderados</div></div>
  </div>
  <div class="dashboard-grid">
    <div class="card">
      <div class="card-head"><div class="card-title">💬 Chat en vivo</div><button class="btn btn-ghost btn-sm" onclick="document.getElementById('chat-feed').innerHTML=''">Limpiar</button></div>
      <div class="card-body p0" style="padding:.625rem"><div class="chat-feed" id="chat-feed"></div></div>
    </div>
    <div class="card">
      <div class="card-head"><div class="card-title">🎵 Cola actual</div><span style="font-size:.7rem;color:var(--t3)">${queue.length} canciones</span></div>
      <div class="card-body p0" style="padding:.625rem">

        <div class="mod-rule">
          <div class="mod-rule-info"><div class="mod-rule-title">Duración del timeout</div><div class="mod-rule-desc"><span id="timeout-val">${mod.timeout||300}</span> segundos</div></div>
          <div class="mod-rule-controls"><input type="range" class="range-input" id="mod-timeout" min="30" max="3600" value="${mod.timeout||300}" oninput="document.getElementById('timeout-val').textContent=this.value"></div>
        </div>
      </div>
    </div>
    <div>
      <div class="card">
        <div class="card-head"><div class="card-title">🚫 PALABRAS BANEADAS</div><button class="btn btn-ghost btn-sm" onclick="openBanWordModal()">+ Agregar</button></div>
        <div id="banned-list">
        ${banned.length?banned.map(w=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:.6rem 1.125rem;border-bottom:1px solid var(--b1)">
          <code style="background:var(--s3);padding:.2em .6em;border-radius:4px;font-family:'IBM Plex Mono',monospace;font-size:.8rem;color:var(--red)">${w.word}</code>
          <button class="btn btn-danger btn-sm" onclick="deleteBanWord(${w.id})">Eliminar</button>
        </div>`).join(''):'<div class="empty"><div class="empty-icon">🚫</div>No hay palabras baneadas</div>'}
        </div>
      </div>
    </div>
  </div>`;
}
async function saveMod() {
  const body={links:{enabled:document.getElementById('mod-links').classList.contains('on')},caps:{enabled:document.getElementById('mod-caps').classList.contains('on'),max:parseInt(document.getElementById('mod-caps-max').value)},spam:{enabled:document.getElementById('mod-spam').classList.contains('on')},timeout:parseInt(document.getElementById('mod-timeout').value)};
  await api('/api/moderation','PUT',body); sysMsg('✅ Configuración de moderación guardada.'); renderModeration();
}
function openBanWordModal() {
  document.getElementById('modal-title').textContent='Banear palabra';
  document.getElementById('modal-body').innerHTML=`<div class="form-group"><label class="form-label">Palabra o frase</label><input class="input" id="ban-word" placeholder="palabra a banear"></div>`;
  document.getElementById('modal-footer').innerHTML=`<button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-danger" onclick="saveBanWord()">Banear</button>`;
  openModal();
}
async function saveBanWord() { const w=document.getElementById('ban-word').value.trim(); if(!w)return; await api('/api/bannedwords','POST',{word:w}); closeModal(); renderModeration(); }
async function deleteBanWord(id) { await api(`/api/bannedwords/${id}`,'DELETE'); renderModeration(); }

// ─── LOGS ───
let logFilter='all';
async function renderLogs() {
  const logs=await api('/api/logs');
  document.getElementById('topbar-actions').innerHTML=`<button class="btn btn-ghost btn-sm" onclick="clearLogs()">🗑 Limpiar logs</button>`;
  const c=document.getElementById('page-content');
  const types=['all','chat','command','mod','gift','system','timer'];
  const icons={chat:'💬',command:'⌘',mod:'🛡',gift:'🎁',system:'⚙️',timer:'⏱',follow:'💜'};
  const filtered=logFilter==='all'?logs:logs.filter(l=>l.type===logFilter);
  c.innerHTML=`
  <div class="log-filters">
    ${types.map(t=>`<button class="log-filter ${logFilter===t?'active':''}" onclick="logFilter='${t}';renderLogs()">${t==='all'?'Todos':t.charAt(0).toUpperCase()+t.slice(1)}</button>`).join('')}
  </div>
  <div class="card">
    <div class="card-head"><div class="card-title">📋 REGISTRO DE ACTIVIDAD</div><span style="font-size:.7rem;color:var(--t3)">${filtered.length} entradas</span></div>
    <div class="card-body p0">
    ${filtered.length?filtered.map(l=>`<div class="log-entry fade-in">
      <div class="log-icon log-type-${l.type}">${icons[l.type]||'•'}</div>
      <div class="log-time">${new Date(l.ts).toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}</div>
      <div class="log-text">${l.user?`<span class="user">${l.user}</span> `:''}${l.text||''}</div>
      <span class="badge badge-gray" style="font-size:.58rem">${l.type}</span>
    </div>`).join(''):`<div class="empty"><div class="empty-icon">📋</div>No hay logs todavía.</div>`}
    </div>
  </div>`;
}
async function clearLogs() { if(!confirm('¿Limpiar todos los logs?'))return; await fetch('/api/logs',{method:'DELETE'}).catch(()=>{}); renderLogs(); }

// ============================================================
// API HELPERS
// ============================================================
async function api(url, method='GET', body=null) {
  const opts={method,headers:{'Content-Type':'application/json'}};
  if(body) opts.body=JSON.stringify(body);
  try{const r=await fetch(url,opts);return await r.json();}catch{return method==='GET'?[]:{};}
}

// ============================================================
// MODAL
// ============================================================
function openModal() { document.getElementById('modal').classList.add('open'); }
function closeModal() { document.getElementById('modal').classList.remove('open'); }
document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))closeModal();});

// ============================================================
// UTILS
// ============================================================
function fmt(s){const m=Math.floor(s/60),sec=s%60;return`${m}:${String(sec).padStart(2,'0')}`;}
function startLiveTimer(){liveTimer=setInterval(()=>{liveStats.liveSecs++;},1000);}
function stopLiveTimer(){clearInterval(liveTimer);clearInterval(progTimer);}

// Enter key
document.getElementById('inp-user').addEventListener('keydown',e=>{if(e.key==='Enter')connectToLive();});
</script>
